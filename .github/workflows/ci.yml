name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Python tests
        run: python3 -m unittest discover -s tests

      - name: JavaScript syntax
        run: node --check web/app.js

      - name: Build public site
        run: npm run build

      - name: Privacy scan public assets
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          targets = [
              Path("web/data/latest.json"),
              Path("web/data/reports.json"),
              Path("web/index.html"),
          ]
          patterns = [
              r'"quantity"',
              r'"market_value"',
              r'"cost_basis"',
              r'"accounts"',
              r'"brokers"',
              r"vanguard" + r"-sleeve",
              r"1443\.12",
              r"IBKR_FLEX",
              r"U[0-9]{4,}",
          ]
          failures = []
          for target in targets:
              text = target.read_text(encoding="utf-8")
              for pattern in patterns:
                  if re.search(pattern, text):
                      failures.append(f"{target}: matched {pattern}")
          if failures:
              raise SystemExit("\n".join(failures))
          print("public privacy scan passed")
          PY
