name: Scheduled Reports

on:
  schedule:
    - cron: "0 12 * * 1-5"
    - cron: "0 13 * * 1-5"
    - cron: "30 13 * * 1-5"
    - cron: "0 14 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "0 15 * * 1-5"
    - cron: "0 16 * * 1-5"
    - cron: "0 17 * * 1-5"
    - cron: "0 18 * * 1-5"
    - cron: "0 19 * * 1-5"
    - cron: "0 20 * * 1-5"
    - cron: "30 20 * * 1-5"
    - cron: "0 21 * * 1-5"
    - cron: "30 21 * * 1-5"
    - cron: "0 14 * * 0"
  workflow_dispatch:
    inputs:
      kind:
        description: "Pipeline kind"
        required: true
        default: "premarket"
        type: choice
        options:
          - premarket
          - market_open
          - intraday
          - midday
          - market_close
          - postmarket
          - weekly
      force:
        description: "Bypass schedule and trading-day gating"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: scheduled-reports-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python package
        run: python3 -m pip install -e .

      - name: Determine pipeline kind
        id: pipeline
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          INPUT_KIND: ${{ inputs.kind }}
          INPUT_FORCE: ${{ inputs.force }}
        shell: bash
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "kind=$INPUT_KIND" >> "$GITHUB_OUTPUT"
            echo "force=$INPUT_FORCE" >> "$GITHUB_OUTPUT"
            echo "scheduled_at=" >> "$GITHUB_OUTPUT"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual dispatch" >> "$GITHUB_OUTPUT"
          else
            python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          from invest.scheduler import infer_scheduled_at_from_cron, kind_for_scheduled_at

          scheduled_at = infer_scheduled_at_from_cron(os.environ["EVENT_SCHEDULE"])
          kind = kind_for_scheduled_at(scheduled_at)
          print(f"scheduled_at={scheduled_at.isoformat().replace('+00:00', 'Z')}")
          print("force=false")
          if kind:
              print(f"kind={kind}")
              print("should_run=true")
              print(f"reason=scheduled {kind} slot")
          else:
              print("kind=noop")
              print("should_run=false")
              print("reason=no active ET report window for this seasonal duplicate slot")
          PY
          fi

      - name: Materialize private config
        if: steps.pipeline.outputs.should_run == 'true'
        env:
          ALLOIQ_CONFIG_TOML: ${{ secrets.ALLOIQ_CONFIG_TOML }}
        shell: bash
        run: |
          if [[ -z "$ALLOIQ_CONFIG_TOML" ]]; then
            echo "Missing ALLOIQ_CONFIG_TOML repository secret." >&2
            exit 1
          fi
          mkdir -p config
          printf '%s\n' "$ALLOIQ_CONFIG_TOML" > config/invest.toml

      - name: Migrate private warehouse
        if: steps.pipeline.outputs.should_run == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 -m invest warehouse migrate

      - name: Python tests
        if: steps.pipeline.outputs.should_run == 'true'
        run: python3 -m unittest discover -s tests

      - name: JavaScript syntax
        if: steps.pipeline.outputs.should_run == 'true'
        run: node --check web/app.js

      - name: Build public site from committed snapshot
        if: steps.pipeline.outputs.should_run == 'true'
        shell: bash
        run: |
          mkdir -p /tmp/alloiq-web-check/data
          cp web/data/latest.json web/data/reports.json /tmp/alloiq-web-check/data/
          python3 -m invest site build --privacy public --out-dir /tmp/alloiq-web-check

      - name: Preserve previous public snapshot
        if: steps.pipeline.outputs.should_run == 'true'
        shell: bash
        run: cp web/data/latest.json /tmp/alloiq-previous-latest.json || true

      - name: Run scheduled pipeline
        id: scheduled_pipeline
        if: steps.pipeline.outputs.should_run == 'true'
        env:
          IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_FLEX_ACTIVITY_QUERY_ID: ${{ secrets.IBKR_FLEX_ACTIVITY_QUERY_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          FINRA_API_TOKEN: ${{ secrets.FINRA_API_TOKEN }}
          CFTC_APP_TOKEN: ${{ secrets.CFTC_APP_TOKEN }}
        shell: bash
        run: |
          args=(--kind "${{ steps.pipeline.outputs.kind }}" --privacy public)
          if [[ "${{ steps.pipeline.outputs.force }}" == "true" ]]; then
            args+=(--force)
          fi
          if [[ -n "${{ steps.pipeline.outputs.scheduled_at }}" ]]; then
            args+=(--scheduled-at "${{ steps.pipeline.outputs.scheduled_at }}")
          fi
          python3 -m invest pipeline "${args[@]}" | tee /tmp/alloiq-pipeline-result.json
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          text = Path("/tmp/alloiq-pipeline-result.json").read_text(encoding="utf-8")
          decoder = json.JSONDecoder()
          result = None
          for index, character in enumerate(text):
              if character != "{":
                  continue
              try:
                  candidate, _ = decoder.raw_decode(text[index:])
              except json.JSONDecodeError:
                  continue
              if isinstance(candidate, dict) and "status" in candidate:
                  result = candidate
          if result is None:
              raise SystemExit("No pipeline result JSON object found in pipeline output")
          print(f"status={result.get('status', 'unknown')}")
          print("reason<<PIPELINE_REASON")
          print(str(result.get("reason", "")))
          print("PIPELINE_REASON")
          PY

      - name: Privacy scan public assets
        if: steps.scheduled_pipeline.outputs.status == 'ran'
        run: python3 -m invest privacy-scan

      - name: Commit public data snapshot
        if: steps.scheduled_pipeline.outputs.status == 'ran'
        shell: bash
        run: |
          git add web/data/latest.json web/data/reports.json
          if git diff --cached --quiet; then
            echo "No public data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update scheduled AlloIQ ${{ steps.pipeline.outputs.kind }} snapshot"
          git push

      - name: Send Telegram briefing
        if: steps.scheduled_pipeline.outputs.status == 'ran'
        env:
          ALLOIQ_TELEGRAM_BOT_TOKEN: ${{ secrets.ALLOIQ_TELEGRAM_BOT_TOKEN }}
          ALLOIQ_TELEGRAM_CHAT_ID: ${{ secrets.ALLOIQ_TELEGRAM_CHAT_ID }}
          PIPELINE_KIND: ${{ steps.pipeline.outputs.kind }}
          PIPELINE_STATUS: ${{ steps.scheduled_pipeline.outputs.status }}
          PIPELINE_REASON: ${{ steps.scheduled_pipeline.outputs.reason }}
        shell: bash
        run: |
          if [[ -z "${ALLOIQ_TELEGRAM_BOT_TOKEN:-}" || -z "${ALLOIQ_TELEGRAM_CHAT_ID:-}" ]]; then
            echo "Telegram briefing skipped: missing ALLOIQ_TELEGRAM_BOT_TOKEN or ALLOIQ_TELEGRAM_CHAT_ID."
            exit 0
          fi
          if [[ "${{ steps.pipeline.outputs.kind }}" =~ ^(premarket|midday|postmarket|weekly)$ ]]; then
            python3 -m invest notify \
              --session "${{ steps.pipeline.outputs.kind }}" \
              --channel telegram
          else
            python3 -m invest notify \
              --session "${{ steps.pipeline.outputs.kind }}" \
              --channel telegram \
              --urgent-only \
              --compare-to /tmp/alloiq-previous-latest.json
          fi

      - name: Send Telegram pipeline warning
        if: steps.scheduled_pipeline.outputs.status != '' && steps.scheduled_pipeline.outputs.status != 'ran'
        env:
          ALLOIQ_TELEGRAM_BOT_TOKEN: ${{ secrets.ALLOIQ_TELEGRAM_BOT_TOKEN }}
          ALLOIQ_TELEGRAM_CHAT_ID: ${{ secrets.ALLOIQ_TELEGRAM_CHAT_ID }}
          PIPELINE_KIND: ${{ steps.pipeline.outputs.kind }}
          PIPELINE_STATUS: ${{ steps.scheduled_pipeline.outputs.status }}
          PIPELINE_REASON: ${{ steps.scheduled_pipeline.outputs.reason }}
        shell: bash
        run: |
          if [[ -z "${ALLOIQ_TELEGRAM_BOT_TOKEN:-}" || -z "${ALLOIQ_TELEGRAM_CHAT_ID:-}" ]]; then
            echo "Telegram pipeline warning skipped: missing ALLOIQ_TELEGRAM_BOT_TOKEN or ALLOIQ_TELEGRAM_CHAT_ID."
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os

          from invest.notifications import send_telegram_message

          kind = os.environ.get("PIPELINE_KIND", "scheduled")
          status = os.environ.get("PIPELINE_STATUS", "unknown")
          reason = os.environ.get("PIPELINE_REASON", "")
          message = (
              f"AlloIQ {kind} pipeline {status}\n"
              f"Reason: {reason or 'No reason emitted.'}\n"
              "No public snapshot was published; the existing site remains unchanged."
          )
          result = send_telegram_message(
              os.environ["ALLOIQ_TELEGRAM_BOT_TOKEN"],
              os.environ["ALLOIQ_TELEGRAM_CHAT_ID"],
              message,
          )
          print(json.dumps(result, indent=2, sort_keys=True))
          PY
