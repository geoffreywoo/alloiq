[product]
name = "AlloIQ"
domain = "alloiq.com"

[database]
path = "data/invest.db"

[reports]
directory = "reports"
timezone = "America/Puerto_Rico"
premarket_time = "08:00"
market_open_time = "09:30"
intraday_times = ["10:00", "11:00", "12:00", "14:00", "15:00"]
midday_time = "13:00"
market_close_time = "16:00"
postmarket_time = "17:00"

[notifications]
# Sends compact report briefings after scheduled runs when the required channel
# secrets are present in the environment. Secrets must never be committed.
enabled = true
site_url = "https://alloiq.com"

[notifications.telegram]
enabled = true
bot_token_env = "ALLOIQ_TELEGRAM_BOT_TOKEN"
chat_id_env = "ALLOIQ_TELEGRAM_CHAT_ID"
timeout_seconds = 10

[ibkr]
enabled = true
token_env = "IBKR_FLEX_TOKEN"
activity_query_id_env = "IBKR_FLEX_ACTIVITY_QUERY_ID"
raw_directory = "data/raw/ibkr"

[vanguard]
enabled = false
import_directory = "data/imports/vanguard"
stale_after_days = 7

[portfolio]
# Optional manually maintained sleeves. These are valued from latest quote data
# during report generation and published only as aggregate weights in public mode.
# [[portfolio.manual_positions]]
# broker = "external"
# account = "sample-sleeve"
# symbol = "NVDA"
# description = "NVIDIA Corp"
# quantity = 0
#
# Optional cash reserves. Public snapshots publish only the percentage weight.
# Use either a private amount or a target weight. When only weight is supplied,
# the report derives a private synthetic cash value from the current portfolio
# denominator so public weights include cash without exposing account size.
# [[portfolio.cash_reserves]]
# currency = "USD"
# weight = 0.10
# description = "Cash reserves"

[risk]
max_single_name_weight = 0.15
max_bucket_weight = 0.45
max_daily_turnover = 0.08
max_one_ticket_delta = 0.03
max_cash_deploy_weight = 0.02
min_signal_family_count = 2
earnings_blackout_days = 2
earnings_risk_window_days = 7
no_add_symbols = []
watch_only_symbols = []

[llm]
# Optional LLM signal layer. Disabled by default; it never writes target
# weights, deltas, trade actions, or live orders. In shadow mode, reviews are
# recorded but do not affect scores or approval tickets. In review_gate mode,
# review_required=true adds a human approval check only. In bounded_signal mode,
# GPT-5.5 can adjust expected-return/evidence/risk features within caps before
# deterministic sizing runs.
enabled = false
provider = "openai"
model = "gpt-5.5"
reasoning_effort = "high"
api_key_env = "OPENAI_API_KEY"
max_symbols_per_run = 12
mode = "shadow"
cache_enabled = true
cache_path = "data/cache/llm_signal_cache.json"
max_expected_return_delta = 6.0
max_evidence_quality_delta = 10.0
max_drawdown_risk_delta = 10.0

[earnings]
# Free-first provider layer. Manual dates and company IR feeds are treated as
# canonical when present. Alpha Vantage is optional and uses a free API key from
# the environment. Nasdaq is a no-key fallback derived from its public earnings
# calendar, so it is treated as estimated.
[earnings.providers]
alpha_vantage_enabled = true
alpha_vantage_api_key_env = "ALPHA_VANTAGE_API_KEY"
alpha_vantage_horizon = "3month"
nasdaq_enabled = true
nasdaq_lookahead_days = 45
nasdaq_max_requests = 20
nasdaq_timeout_seconds = 3
nasdaq_retries = 2
ir_feed_enabled = true

# Optional manually maintained earnings dates. These are used as the reliable
# baseline for earnings-window risk and publish only sanitized event metadata.
# [[earnings.events]]
# symbol = "NVDA"
# event_date = "2026-05-27"
# fiscal_period = "FY2027 Q1"
# status = "confirmed"
# source = "manual"

# Optional SEC company submissions feed entries for 10-Q/10-K/8-K markers.
# [[earnings.sec_companies]]
# symbol = "NVDA"
# cik = "0001045810"

# Optional company IR RSS/Atom feeds. Feed items with earnings/results language
# are parsed for explicit dates first; otherwise they become company-result
# markers, not forward earnings dates.
# [[earnings.ir_feeds]]
# symbol = "NVDA"
# url = "https://investor.nvidia.com/news/press-releases/rss"

