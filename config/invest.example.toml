[macro.fred]
# No-key FRED CSV series used as structured macro signals for credit stress,
# liquidity pressure, yield-curve shape, and energy input costs.
enabled = true
timeout_seconds = 5
max_observations = 520
series = ["DGS10", "DGS2", "BAMLH0A0HYM2", "NFCI", "WALCL", "DCOILWTICO", "DHHNGSP"]

[external_signals]
# Free-first external feed layer used by the feature matrix and engine.
# Missing optional API keys are reported as limited source health rather than
# breaking scheduled publication. Alpha Vantage News uses the same key as the
# earnings calendar. EIA and FINRA keys can be added later without code changes.
timeout_seconds = 8
max_runtime_seconds = 30
tail_provider_reserve_seconds = 8
alpha_vantage_news_enabled = true
alpha_vantage_api_key_env = "ALPHA_VANTAGE_API_KEY"
alpha_vantage_news_max_symbols = 35
alpha_vantage_news_limit = 50
alpha_vantage_news_timespan_days = 3
gdelt_enabled = true
gdelt_timespan_days = 3
gdelt_max_records = 25
gdelt_timeout_seconds = 4
gdelt_max_failures = 2
gdelt_fallback_enabled = true
gdelt_fallback_timespan_days = 1
gdelt_fallback_max_records = 5
sec_company_enabled = true
sec_company_max_symbols = 18
sec_auto_cik_lookup = true
eia_enabled = true
eia_api_key_env = "EIA_API_KEY"
eia_frequency = "monthly"
eia_data_field = "generation"
finra_short_interest_enabled = true
finra_api_token_env = "FINRA_API_TOKEN"
finra_max_rows = 5000
finra_short_interest_max_age_days = 75
cftc_cot_enabled = true
cftc_app_token_env = "CFTC_APP_TOKEN"
cftc_max_rows = 5000
cftc_cot_max_age_days = 45
cftc_markets = ["NASDAQ-100", "S&P 500", "E-MINI NASDAQ", "NATURAL GAS", "WTI"]

